<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A"/>
      <stop offset="0.5" stop-color="#1E3A5F"/>
      <stop offset="1" stop-color="#0F172A"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="300" cy="150" r="200" fill="#2563EB" opacity="0.1"/>
  <circle cx="900" cy="480" r="250" fill="#4F46E5" opacity="0.1"/>

  <!-- Logo building icon (large) -->
  <g transform="translate(100, 180)">
    <rect x="0" y="50" width="120" height="180" rx="8" fill="#2563EB"/>
    <rect x="35" y="15" width="50" height="45" rx="5" fill="#3B82F6"/>
    <circle cx="60" cy="10" r="8" fill="#60A5FA"/>
    <!-- Windows -->
    <rect x="15" y="75" width="25" height="18" rx="3" fill="#BFDBFE"/>
    <rect x="80" y="75" width="25" height="18" rx="3" fill="#BFDBFE"/>
    <rect x="15" y="115" width="25" height="18" rx="3" fill="#BFDBFE"/>
    <rect x="80" y="115" width="25" height="18" rx="3" fill="#BFDBFE"/>
    <rect x="15" y="155" width="25" height="18" rx="3" fill="#BFDBFE"/>
    <rect x="80" y="155" width="25" height="18" rx="3" fill="#BFDBFE"/>
    <!-- Door -->
    <rect x="38" y="195" width="44" height="35" rx="4" fill="#DBEAFE"/>
  </g>

  <!-- Text -->
  <text x="300" y="300" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="bold" fill="white">PropTech Lab</text>
  <text x="300" y="370" font-family="system-ui, -apple-system, sans-serif" font-size="32" fill="#94A3B8">인터랙티브 프롭테크 학습 서비스</text>

  <!-- Feature tags -->
  <rect x="300" y="420" width="200" height="40" rx="20" fill="#2563EB" opacity="0.3"/>
  <text x="340" y="447" font-family="system-ui, sans-serif" font-size="18" fill="#93C5FD">용적률 시뮬레이터</text>

  <rect x="520" y="420" width="160" height="40" rx="20" fill="#2563EB" opacity="0.3"/>
  <text x="548" y="447" font-family="system-ui, sans-serif" font-size="18" fill="#93C5FD">3D 시각화</text>

  <rect x="700" y="420" width="180" height="40" rx="20" fill="#2563EB" opacity="0.3"/>
  <text x="733" y="447" font-family="system-ui, sans-serif" font-size="18" fill="#93C5FD">수익성 분석</text>

  <!-- URL -->
  <text x="300" y="530" font-family="system-ui, sans-serif" font-size="22" fill="#64748B">jay-swk.github.io/proptech-lab</text>
</svg>
