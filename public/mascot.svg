<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 140" fill="none">
  <!-- Shadow -->
  <ellipse cx="60" cy="135" rx="35" ry="5" fill="#CBD5E1" opacity="0.4"/>

  <!-- Body (building shape) -->
  <rect x="30" y="40" width="60" height="90" rx="8" fill="#2563EB"/>
  <!-- Body shine -->
  <rect x="30" y="40" width="30" height="90" rx="8" fill="#3B82F6" opacity="0.3"/>

  <!-- Hat (roof) -->
  <rect x="40" y="20" width="40" height="24" rx="4" fill="#1E40AF"/>
  <rect x="52" y="10" width="16" height="14" rx="3" fill="#1E40AF"/>
  <!-- Antenna -->
  <rect x="58" y="2" width="4" height="10" rx="2" fill="#3B82F6"/>
  <circle cx="60" cy="2" r="3" fill="#60A5FA"/>

  <!-- Face -->
  <!-- Eyes -->
  <ellipse cx="47" cy="65" rx="6" ry="7" fill="white"/>
  <ellipse cx="73" cy="65" rx="6" ry="7" fill="white"/>
  <ellipse cx="48" cy="66" rx="3" ry="3.5" fill="#1E293B"/>
  <ellipse cx="74" cy="66" rx="3" ry="3.5" fill="#1E293B"/>
  <!-- Eye shine -->
  <circle cx="49.5" cy="64" r="1.5" fill="white"/>
  <circle cx="75.5" cy="64" r="1.5" fill="white"/>

  <!-- Smile -->
  <path d="M48 80 Q60 92 72 80" stroke="white" stroke-width="3" stroke-linecap="round" fill="none"/>

  <!-- Cheeks (blush) -->
  <ellipse cx="40" cy="78" rx="5" ry="3" fill="#F472B6" opacity="0.4"/>
  <ellipse cx="80" cy="78" rx="5" ry="3" fill="#F472B6" opacity="0.4"/>

  <!-- Windows on body -->
  <rect x="38" y="95" width="10" height="8" rx="2" fill="#BFDBFE"/>
  <rect x="55" y="95" width="10" height="8" rx="2" fill="#BFDBFE"/>
  <rect x="72" y="95" width="10" height="8" rx="2" fill="#BFDBFE"/>
  <rect x="38" y="110" width="10" height="8" rx="2" fill="#BFDBFE"/>
  <rect x="55" y="110" width="10" height="8" rx="2" fill="#BFDBFE"/>
  <rect x="72" y="110" width="10" height="8" rx="2" fill="#BFDBFE"/>

  <!-- Arms -->
  <!-- Left arm (waving) -->
  <path d="M30 70 Q15 55 8 45" stroke="#2563EB" stroke-width="8" stroke-linecap="round" fill="none"/>
  <circle cx="6" cy="43" r="5" fill="#3B82F6"/>
  <!-- Right arm -->
  <path d="M90 75 Q105 70 112 60" stroke="#2563EB" stroke-width="8" stroke-linecap="round" fill="none"/>
  <circle cx="114" cy="58" r="5" fill="#3B82F6"/>

  <!-- Feet -->
  <ellipse cx="45" cy="132" rx="10" ry="5" fill="#1E40AF"/>
  <ellipse cx="75" cy="132" rx="10" ry="5" fill="#1E40AF"/>
</svg>
